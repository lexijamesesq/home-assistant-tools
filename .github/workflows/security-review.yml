name: Security Review
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  security-review:
    if: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for security concerns: hardcoded credentials,
            injection vulnerabilities, unsafe file operations, PII exposure.
            Focus on the diff only. Be concise.
